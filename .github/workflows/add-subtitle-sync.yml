name: Add subtitle synchronization

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-subtitle-sync.yml

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Patch player
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/EnhancedVideoPlayer.tsx')
          source = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, name: str) -> None:
              global source
              if new in source:
                  return
              if source.count(old) != 1:
                  raise SystemExit(f'Expected exactly one {name} block, found {source.count(old)}')
              source = source.replace(old, new, 1)

          replace_once(
              "const PROGRESS_MAX_AGE_MS = 180 * 24 * 60 * 60 * 1000;",
              """const PROGRESS_MAX_AGE_MS = 180 * 24 * 60 * 60 * 1000;
const DEFAULT_GOOGLE_SUBTITLE_DELAY_SECONDS = 0.25;
const MIN_SUBTITLE_DELAY_SECONDS = -5;
const MAX_SUBTITLE_DELAY_SECONDS = 5;
const SUBTITLE_DELAY_STEP_SECONDS = 0.05;""",
              'subtitle constants',
          )

          replace_once(
              """function completionWindow(duration: number): number {
  return Math.min(120, Math.max(30, duration * 0.02));
}""",
              """function completionWindow(duration: number): number {
  return Math.min(120, Math.max(30, duration * 0.02));
}

function clampSubtitleDelay(value: number): number {
  const bounded = Math.max(
    MIN_SUBTITLE_DELAY_SECONDS,
    Math.min(MAX_SUBTITLE_DELAY_SECONDS, value),
  );
  return Math.round(bounded / SUBTITLE_DELAY_STEP_SECONDS) * SUBTITLE_DELAY_STEP_SECONDS;
}

function subtitleDelayLabel(value: number): string {
  if (Math.abs(value) < 0.001) return '0.00s';
  return `${value > 0 ? '+' : ''}${value.toFixed(2)}s`;
}""",
              'subtitle delay helpers',
          )

          replace_once(
              """  const subtitleObjectUrlRef = useRef<string | null>(null);
  const preferredAudioRef = useRef<TrackPreference | null>(null);""",
              """  const subtitleObjectUrlRef = useRef<string | null>(null);
  const subtitleCueTimingRef = useRef(
    new WeakMap<TextTrackCue, { startTime: number; endTime: number }>(),
  );
  const subtitleDelayRef = useRef(0);
  const automaticSubtitleDelayKeyRef = useRef<string | null>(null);
  const preferredAudioRef = useRef<TrackPreference | null>(null);""",
              'subtitle timing refs',
          )

          replace_once(
              """  const [subtitleSelection, setSubtitleSelection] = useState<SubtitleSelection>({
    kind: 'off',
  });

  const activeSource = availableSources[activeSourceIndex] || availableSources[0];""",
              """  const [subtitleSelection, setSubtitleSelection] = useState<SubtitleSelection>({
    kind: 'off',
  });
  const [subtitleDelaySeconds, setSubtitleDelaySeconds] = useState(0);

  const activeSource = availableSources[activeSourceIndex] || availableSources[0];""",
              'subtitle delay state',
          )

          replace_once(
              """  useEffect(() => {
    if (videoRef.current) videoRef.current.playbackRate = playbackRate;
  }, [playbackRate]);

  useEffect(() => {""",
              """  useEffect(() => {
    if (videoRef.current) videoRef.current.playbackRate = playbackRate;
  }, [playbackRate]);

  const applySubtitleDelay = useCallback((delay = subtitleDelayRef.current) => {
    const video = videoRef.current;
    if (!video) return;

    for (let trackIndex = 0; trackIndex < video.textTracks.length; trackIndex += 1) {
      const cues = video.textTracks[trackIndex]?.cues;
      if (!cues) continue;

      for (let cueIndex = 0; cueIndex < cues.length; cueIndex += 1) {
        const cue = cues[cueIndex];
        if (!cue) continue;

        let original = subtitleCueTimingRef.current.get(cue);
        if (!original) {
          original = { startTime: cue.startTime, endTime: cue.endTime };
          subtitleCueTimingRef.current.set(cue, original);
        }

        const nextStart = Math.max(0, original.startTime + delay);
        const nextEnd = Math.max(nextStart + 0.01, original.endTime + delay);
        try {
          cue.startTime = nextStart;
          cue.endTime = nextEnd;
        } catch {
          // Some browser-provided cue implementations expose read-only timing.
        }
      }
    }
  }, []);

  useEffect(() => {
    subtitleDelayRef.current = subtitleDelaySeconds;
    applySubtitleDelay(subtitleDelaySeconds);
  }, [applySubtitleDelay, subtitleDelaySeconds]);

  useEffect(() => {
    const strategy = activePlaybackTarget?.strategy;
    const sourceKey = activePlaybackSource?.url;
    if (!sourceKey || !strategy) return;

    const automaticKey = `${sourceKey}|${strategy}`;
    if (automaticSubtitleDelayKeyRef.current === automaticKey) return;
    automaticSubtitleDelayKeyRef.current = automaticKey;

    const usesGoogleCompatibility =
      strategy === 'google-remux' || strategy === 'google-transcode';
    setSubtitleDelaySeconds(
      usesGoogleCompatibility ? DEFAULT_GOOGLE_SUBTITLE_DELAY_SECONDS : 0,
    );
  }, [activePlaybackSource?.url, activePlaybackTarget?.strategy]);

  useEffect(() => {""",
              'subtitle delay effects',
          )

          replace_once(
              """      hls.on(Hls.Events.SUBTITLE_TRACKS_CLEARED, () => {
        if (!isGenerationActive()) return;
        currentSubtitleTracks = [];
        setSubtitleTracks([]);
        setSubtitleSelection(
          desiredSubtitleSelectionRef.current.kind === 'upload'
            ? { kind: 'upload' }
            : { kind: 'off' },
        );
      });
      hls.on(Hls.Events.ERROR, (_, data) => {""",
              """      hls.on(Hls.Events.SUBTITLE_TRACKS_CLEARED, () => {
        if (!isGenerationActive()) return;
        currentSubtitleTracks = [];
        setSubtitleTracks([]);
        setSubtitleSelection(
          desiredSubtitleSelectionRef.current.kind === 'upload'
            ? { kind: 'upload' }
            : { kind: 'off' },
        );
      });
      hls.on(Hls.Events.SUBTITLE_FRAG_PROCESSED, () => {
        if (!isGenerationActive()) return;
        const timer = setTimeout(() => {
          recoveryTimers.delete(timer);
          if (isGenerationActive()) applySubtitleDelay();
        }, 0);
        recoveryTimers.add(timer);
      });
      hls.on(Hls.Events.ERROR, (_, data) => {""",
              'subtitle fragment synchronization',
          )

          replace_once(
              """    progressKey,
    reloadToken,
  ]);""",
              """    applySubtitleDelay,
    progressKey,
    reloadToken,
  ]);""",
              'playback effect dependency',
          )

          replace_once(
              """            srcLang="en"
            label={subtitleLabel || 'Uploaded subtitles'}
          />""",
              """            srcLang="en"
            label={subtitleLabel || 'Uploaded subtitles'}
            onLoad={() => applySubtitleDelay()}
          />""",
              'uploaded subtitle synchronization',
          )

          replace_once(
              """                {subtitleUrl && (
                  <button""",
              """                <div
                  data-testid="subtitle-sync-control"
                  className="rounded-xl border border-white/10 bg-white/[0.045] p-4"
                >
                  <div className="flex items-start justify-between gap-4">
                    <div>
                      <div className="font-semibold">Subtitle synchronization</div>
                      <div className="mt-0.5 text-xs text-white/50">
                        Positive values show subtitles later.
                      </div>
                    </div>
                    <div className="rounded-lg bg-black/30 px-2.5 py-1 text-sm font-semibold tabular-nums text-white/85">
                      {subtitleDelayLabel(subtitleDelaySeconds)}
                    </div>
                  </div>
                  <input
                    type="range"
                    min={MIN_SUBTITLE_DELAY_SECONDS}
                    max={MAX_SUBTITLE_DELAY_SECONDS}
                    step={SUBTITLE_DELAY_STEP_SECONDS}
                    value={subtitleDelaySeconds}
                    onChange={(event) =>
                      setSubtitleDelaySeconds(clampSubtitleDelay(Number(event.target.value)))
                    }
                    className="mt-4 w-full accent-red-600"
                    aria-label="Subtitle synchronization delay"
                  />
                  <div className="mt-3 grid grid-cols-3 gap-2">
                    <button
                      type="button"
                      onClick={() =>
                        setSubtitleDelaySeconds((value) => clampSubtitleDelay(value - 0.1))
                      }
                      className="rounded-lg bg-white/5 px-3 py-2 text-xs font-semibold hover:bg-white/10"
                    >
                      Earlier
                    </button>
                    <button
                      type="button"
                      onClick={() => setSubtitleDelaySeconds(0)}
                      className="rounded-lg bg-white/5 px-3 py-2 text-xs font-semibold hover:bg-white/10"
                    >
                      Reset
                    </button>
                    <button
                      type="button"
                      onClick={() =>
                        setSubtitleDelaySeconds((value) => clampSubtitleDelay(value + 0.1))
                      }
                      className="rounded-lg bg-white/5 px-3 py-2 text-xs font-semibold hover:bg-white/10"
                    >
                      Later
                    </button>
                  </div>
                </div>
                {subtitleUrl && (
                  <button""",
              'subtitle synchronization controls',
          )

          path.write_text(source, encoding='utf-8')
          PY
      - run: npm ci
      - run: npm run build
      - name: Commit verified change and remove workflow
        shell: bash
        run: |
          rm .github/workflows/add-subtitle-sync.yml
          git config user.name "James"
          git config user.email "257743569+jamesjesse24@users.noreply.github.com"
          git add src/components/EnhancedVideoPlayer.tsx .github/workflows/add-subtitle-sync.yml
          git commit -m "Add adjustable subtitle synchronization"
          git push origin HEAD:main

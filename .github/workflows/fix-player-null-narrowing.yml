name: Fix player null narrowing

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-player-null-narrowing.yml

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Patch TypeScript null narrowing
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/components/EnhancedVideoPlayer.tsx")
          source = path.read_text(encoding="utf-8")
          old = """  const activeGooglePlaybackMode: GooglePlaybackMode =
    googlePlaybackOverride?.sourceUrl === activePlaybackSource?.url
      ? googlePlaybackOverride.mode
      : 'direct';
"""
          new = """  const activeGooglePlaybackMode: GooglePlaybackMode =
    googlePlaybackOverride &&
    googlePlaybackOverride.sourceUrl === activePlaybackSource?.url
      ? googlePlaybackOverride.mode
      : 'direct';
"""

          if old not in source:
              raise SystemExit("Expected null-narrowing block was not found")

          path.write_text(source.replace(old, new, 1), encoding="utf-8")

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build

      - name: Commit verified fix
        run: |
          git config user.name "James"
          git config user.email "257743569+jamesjesse24@users.noreply.github.com"
          git rm .github/workflows/fix-player-null-narrowing.yml
          git add src/components/EnhancedVideoPlayer.tsx
          git commit -m "Fix player null narrowing and verify production build"
          git push origin HEAD:main

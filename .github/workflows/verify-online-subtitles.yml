name: Verify online subtitles

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-online-subtitles.yml

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Remove one-time workflow
        shell: pwsh
        run: |
          Remove-Item ".github/workflows/verify-online-subtitles.yml" -Force
          git config user.name "James"
          git config user.email "257743569+jamesjesse24@users.noreply.github.com"
          git add .github/workflows/verify-online-subtitles.yml
          git commit -m "Verify online subtitle integration build"
          git push origin HEAD:main
